# A generic, single database configuration for Alembic.

[alembic]
script_location = alembic
prepend_syspath = .
# sqlalchemy.url is overridden at runtime from DATABASE_URL env var in env.py
; sqlalchemy.url = postgresql+asyncpg://roo:password@localhost:5432/roo_cloud

[alembic.render_as]
# Custom rendering for async dialects
render_as_batch = true

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
