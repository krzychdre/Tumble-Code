<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tumble Code{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css?v={{ asset_v }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/app">Tumble&nbsp;Code <span class="brand-sub">Cloud</span></a>
    <div class="spacer"></div>
    {% if user %}
      <span class="user">{{ user.name }}</span>
      <a class="btn ghost" href="/app/logout">Sign out</a>
    {% else %}
      <a class="btn" href="/app/login">Sign in</a>
    {% endif %}
  </header>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
