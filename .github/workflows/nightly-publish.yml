name: Nightly Publish

on:
  push:
    branches: [main]
  workflow_dispatch: # Allows manual triggering.

jobs:
  publish-nightly:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to create the nightly GitHub release + tag.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install-args: '--frozen-lockfile'
      - name: Forge numeric Nightly version
        id: version
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          NUMBER=$(( 5500 + ${RUN_NUMBER} ))
          echo "number=${NUMBER}" >> $GITHUB_OUTPUT
          echo "version=0.0.${NUMBER}" >> $GITHUB_OUTPUT
      - name: Patch package.json version
        env:
          VERSION_NUMBER: ${{ steps.version.outputs.number }}
        run: |
          node <<'EOF'
            const fs = require('fs');
            const path = require('path');
            const pkgPath = path.join(__dirname, 'apps', 'vscode-nightly', 'package.nightly.json');
            const pkg = JSON.parse(fs.readFileSync(pkgPath,'utf8'));
            const [maj, min] = pkg.version.split('.');
            pkg.version = `${maj}.${min}.${process.env.VERSION_NUMBER}`;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
            console.log(`🔖 Nightly version set to ${pkg.version}`);
          EOF
      - name: Build VSIX
        run: pnpm vsix:nightly # Produces bin/roo-code-nightly-0.0.[count].vsix
      # Marketplace publishing is disabled for this fork (no VSCE_PAT / OVSX_PAT).
      # Instead, attach the nightly VSIX to a GitHub prerelease for direct download.
      - name: Create nightly GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          VSIX_PATH="bin/$(ls bin | head -n1)"
          gh release create "nightly-v${VERSION}" \
            --title "Nightly v${VERSION}" \
            --notes "Automated nightly build from ${GITHUB_SHA}. Download the \`.vsix\` below and install it in VS Code via \"Extensions: Install from VSIX...\"." \
            --prerelease \
            --target "${GITHUB_SHA}" \
            "${VSIX_PATH}"
          echo "Published nightly release nightly-v${VERSION} with asset ${VSIX_PATH}"
